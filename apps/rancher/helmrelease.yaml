apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: rancher-latest
  namespace: flux-system
spec:
  interval: 24h
  url: https://releases.rancher.com/server-charts/latest
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rancher
  namespace: cattle-system
spec:
  interval: 30m
  chart:
    spec:
      chart: rancher
      version: ">=2.8.0"
      sourceRef:
        kind: HelmRepository
        name: rancher-latest
        namespace: flux-system
      interval: 12h
  values:
    hostname: rancher.${BASE_DOMAIN}
    bootstrapPassword: admin   # change after first login
    ingress:
      enabled: true
      ingressClassName: traefik
      tls:
        source: letsEncrypt
    letsEncrypt:
      email: ${ACME_EMAIL}
      ingress:
        class: traefik
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        memory: 1Gi
