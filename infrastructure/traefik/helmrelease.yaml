---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 24h
  url: https://helm.traefik.io/traefik
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: ">=29.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
  values:
    deployment:
      replicas: 2           # 2 Replicas für Ausfallsicherheit

    service:
      type: LoadBalancer    # MetalLB vergibt eine IP aus dem Pool
      annotations:
        metallb.universe.tf/address-pool: homelab-pool

    ingressClass:
      enabled: true
      isDefaultClass: true

    providers:
      kubernetesCRD:
        enabled: true
        allowCrossNamespace: true
      kubernetesIngress:
        enabled: true
        publishedService:
          enabled: true

    # Redirect HTTP -> HTTPS global
    ports:
      web:
        redirectTo:
          port: websecure
      websecure:
        tls:
          enabled: true

    # TLS-Store: Default-Zertifikat
    tlsStore:
      default:
        defaultGeneratedCert:
          resolver: letsencrypt-prod
          domain:
            main: "${BASE_DOMAIN}"
            sans:
              - "*.${BASE_DOMAIN}"

    logs:
      general:
        level: INFO
      access:
        enabled: true

    metrics:
      prometheus:
        entryPoint: metrics
        addEntryPointsLabels: true
        addServicesLabels: true
        addRoutersLabels: true

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi

    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - traefik
              topologyKey: kubernetes.io/hostname
