---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
spec:
  interval: 24h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=61.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    # --- Grafana ---
    grafana:
      enabled: true
      adminPassword: "${GRAFANA_ADMIN_PASSWORD}"   # via SealedSecret überschreiben
      persistence:
        enabled: true
        storageClassName: longhorn
        size: 5Gi
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - grafana.${BASE_DOMAIN}
        tls: []
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: default
              orgId: 1
              folder: ''
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/default
      dashboards:
        default:
          # k3s / Kubernetes Cluster Dashboard
          k8s-cluster:
            gnetId: 15661
            revision: 1
            datasource: Prometheus
          # Node Exporter Full
          node-exporter:
            gnetId: 1860
            revision: 37
            datasource: Prometheus
          # Longhorn Dashboard
          longhorn:
            gnetId: 16888
            revision: 9
            datasource: Prometheus
          # Traefik Dashboard
          traefik:
            gnetId: 17347
            revision: 7
            datasource: Prometheus

    # --- Prometheus ---
    prometheus:
      prometheusSpec:
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 2Gi

    # --- Alertmanager ---
    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 2Gi
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ['alertname', 'job']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: 'null'
          routes:
            - matchers:
                - alertname = "Watchdog"
              receiver: 'null'
            - matchers:
                - severity =~ "warning|critical"
              receiver: 'ntfy'    # ntfy.sh Notification
        receivers:
          - name: 'null'
          - name: 'ntfy'
            webhook_configs:
              - url: '${NTFY_ALERT_URL}'
                send_resolved: true

    # --- Node Exporter ---
    nodeExporter:
      enabled: true

    # --- kube-state-metrics ---
    kubeStateMetrics:
      enabled: true

    # k3s-spezifisch: scheduler/controller-manager laufen anders
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeProxy:
      enabled: false
    kubeEtcd:
      enabled: true
      endpoints:
        - ${MASTER_IP}
      service:
        enabled: true
        port: 2381
        targetPort: 2381
