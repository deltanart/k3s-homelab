# So erstellst du dieses SealedSecret:
#
# 1. Normales Secret als YAML schreiben (NICHT committen!):
#    kubectl create secret generic hetzner-dns-api-token \
#      --namespace cert-manager \
#      --from-literal=api-key="DEIN_HETZNER_DNS_API_TOKEN" \
#      --dry-run=client -o yaml > /tmp/hetzner-secret.yaml
#
# 2. Mit kubeseal verschlüsseln:
#    kubeseal --format yaml \
#      --controller-namespace kube-system \
#      --controller-name sealed-secrets-controller \
#      < /tmp/hetzner-secret.yaml \
#      > gitops/infrastructure/cert-manager/sealed-secret-hetzner.yaml
#
# 3. /tmp/hetzner-secret.yaml LÖSCHEN
#    rm /tmp/hetzner-secret.yaml
#
# 4. Das sealed-secret-hetzner.yaml committen – es ist sicher verschlüsselt
#
# Das fertige SealedSecret sieht so aus (Werte sind Platzhalter):
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hetzner-dns-api-token
  namespace: cert-manager
spec:
  encryptedData:
    api-key: AgB...  # <-- wird von kubeseal befüllt
  template:
    metadata:
      name: hetzner-dns-api-token
      namespace: cert-manager
    type: Opaque
