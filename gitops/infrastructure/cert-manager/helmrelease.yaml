---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: cert-manager
  namespace: flux-system
spec:
  interval: 24h
  url: https://charts.jetstack.io
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: cert-manager-webhook-hetzner
  namespace: flux-system
spec:
  interval: 24h
  url: https://vadimkim.github.io/cert-manager-webhook-hetzner
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  chart:
    spec:
      chart: cert-manager
      version: ">=1.15.0"
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
  values:
    installCRDs: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cert-manager-webhook-hetzner
  namespace: cert-manager
spec:
  interval: 30m
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  chart:
    spec:
      chart: cert-manager-webhook-hetzner
      version: ">=1.0.0"
      sourceRef:
        kind: HelmRepository
        name: cert-manager-webhook-hetzner
        namespace: flux-system
      interval: 12h
  values:
    groupName: acme.yourdomain.de  # <-- anpassen: deine Domain
---
# Secret mit Hetzner DNS API Token
# WICHTIG: Ersetze den Token mit deinem echten Hetzner DNS API Token
# Besser: Verwende SealedSecret (siehe sealed-secret-hetzner.yaml)
apiVersion: v1
kind: Secret
metadata:
  name: hetzner-dns-api-token
  namespace: cert-manager
type: Opaque
stringData:
  api-key: "DEIN_HETZNER_DNS_API_TOKEN"  # <-- anpassen oder SealedSecret verwenden
---
# Staging-Issuer zum Testen (kein Rate-Limit)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: deine@email.de   # <-- anpassen
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.yourdomain.de  # <-- muss mit groupName oben übereinstimmen
            solverName: hetzner
            config:
              secretName: hetzner-dns-api-token
              zoneName: yourdomain.de  # <-- anpassen: deine DNS Zone
              apiUrl: https://dns.hetzner.com/api/v1
---
# Production-Issuer (erst nutzen wenn Staging funktioniert)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: deine@email.de   # <-- anpassen
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.yourdomain.de  # <-- muss mit groupName oben übereinstimmen
            solverName: hetzner
            config:
              secretName: hetzner-dns-api-token
              zoneName: yourdomain.de  # <-- anpassen: deine DNS Zone
              apiUrl: https://dns.hetzner.com/api/v1
