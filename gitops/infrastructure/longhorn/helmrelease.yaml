---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 24h
  url: https://charts.longhorn.io
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: ">=1.7.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 12h
  install:
    createNamespace: true
  values:
    defaultSettings:
      # Replikation auf 2 Nodes (bei 2 Workern sinnvoll)
      defaultReplicaCount: 2
      # Dedicated Disk-Pfad auf den Worker-Nodes
      defaultDataPath: /var/lib/longhorn
      # Automatische Bereinigung von verwaisten Replicas
      orphanAutoDeletion: true
      # Concurrent Backups begrenzen
      concurrentAutomaticEngineUpgradePerNodeLimit: 1
      # Backup-Ziel (NFS oder S3 – optional, später konfigurieren)
      # backupTarget: "s3://dein-bucket@region/"
      # backupTargetCredentialSecret: "longhorn-backup-secret"
      storageMinimalAvailablePercentage: 15
      storageReservedPercentageForDefaultDisk: 10

    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
      reclaimPolicy: Retain     # Daten behalten bei PVC-Löschung!

    ingress:
      enabled: true
      ingressClassName: traefik
      host: longhorn.home.local  # <-- anpassen
      tls: false                 # intern, kein TLS nötig

    metrics:
      serviceMonitor:
        enabled: true           # Prometheus-Integration

    resources:
      manager:
        limits:
          cpu: 300m
          memory: 300Mi
        requests:
          cpu: 100m
          memory: 100Mi
