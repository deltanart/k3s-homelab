---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # Apps erst deployen wenn Infrastructure fertig
  dependsOn:
    - name: infrastructure
  decryption:
    provider: sops   # optional, wenn SOPS statt Sealed Secrets genutzt wird
