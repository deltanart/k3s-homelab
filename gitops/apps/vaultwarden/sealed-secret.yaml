# So erstellst du dieses SealedSecret:
#
# 1. Normales Secret als YAML schreiben (NICHT committen!):
#    kubectl create secret generic vaultwarden-secret \
#      --namespace vaultwarden \
#      --from-literal=ADMIN_TOKEN="$(openssl rand -base64 48)" \
#      --dry-run=client -o yaml > /tmp/vaultwarden-secret.yaml
#
# 2. Mit kubeseal verschlüsseln:
#    kubeseal --format yaml \
#      --controller-namespace kube-system \
#      --controller-name sealed-secrets-controller \
#      < /tmp/vaultwarden-secret.yaml \
#      > apps/vaultwarden/sealed-secret.yaml
#
# 3. /tmp/vaultwarden-secret.yaml LÖSCHEN
#    rm /tmp/vaultwarden-secret.yaml
#
# 4. Das sealed-secret.yaml committen – es ist sicher verschlüsselt
#
# Das fertige SealedSecret sieht so aus (Werte sind Platzhalter):
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: vaultwarden-secret
  namespace: vaultwarden
spec:
  encryptedData:
    ADMIN_TOKEN: AgB...  # <-- wird von kubeseal befüllt
  template:
    metadata:
      name: vaultwarden-secret
      namespace: vaultwarden
    type: Opaque
