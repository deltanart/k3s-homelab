---
# Wird auf dem lokalen Rechner (localhost) ausgeführt

- name: KUBECONFIG in .bashrc/.zshrc eintragen
  ansible.builtin.lineinfile:
    path: "~/.bashrc"
    line: 'export KUBECONFIG=~/.kube/homelab-k3s.yaml'
    regexp: 'KUBECONFIG.*homelab'
  become: false
  delegate_to: localhost

- name: Cluster-Info ausgeben
  ansible.builtin.command: kubectl cluster-info
  register: cluster_info
  environment:
    KUBECONFIG: "~/.kube/homelab-k3s.yaml"
  become: false
  delegate_to: localhost
  changed_when: false

- name: Alle Nodes anzeigen
  ansible.builtin.command: kubectl get nodes -o wide
  register: nodes_info
  environment:
    KUBECONFIG: "~/.kube/homelab-k3s.yaml"
  become: false
  delegate_to: localhost
  changed_when: false

- name: Ausgabe
  ansible.builtin.debug:
    msg:
      - "=== Cluster Info ==="
      - "{{ cluster_info.stdout_lines }}"
      - "=== Nodes ==="
      - "{{ nodes_info.stdout_lines }}"
