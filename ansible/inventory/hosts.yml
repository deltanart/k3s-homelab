---
all:
  children:
    proxmox:
      hosts:
        pve:
          ansible_host: 192.168.1.20        # <-- IP deines Proxmox-Hosts anpassen
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    k3s_cluster:
      children:
        masters:
          hosts:
            k3s-master-01:
              ansible_host: 192.168.1.25
              ansible_user: ubuntu
              ansible_ssh_private_key_file: ~/.ssh/id_ed25519
              k3s_role: server
        workers:
          hosts:
            k3s-worker-01:
              ansible_host: 192.168.1.30
              ansible_user: ubuntu
              ansible_ssh_private_key_file: ~/.ssh/id_ed25519
              k3s_role: agent
            k3s-worker-02:
              ansible_host: 192.168.1.31
              ansible_user: ubuntu
              ansible_ssh_private_key_file: ~/.ssh/id_ed25519
              k3s_role: agent
