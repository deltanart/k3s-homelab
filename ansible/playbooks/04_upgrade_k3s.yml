---
# Sicheres Rolling-Upgrade des Clusters
# Ausführen mit: ansible-playbook playbooks/04_upgrade_k3s.yml -e k3s_version=v1.33.9+k3s1

- name: k3s Master upgraden
  hosts: masters
  become: true
  serial: 1   # Ein Master nach dem anderen (bei HA)
  tasks:
    - name: k3s auf neuer Version installieren
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_VERSION="{{ k3s_version }}" \
        sh -s - server \
          --cluster-init \
          {{ k3s_server_extra_args }}
      changed_when: true

    - name: Warte bis Master wieder Ready
      ansible.builtin.command: >
        kubectl wait node/{{ inventory_hostname }}
          --for=condition=Ready
          --timeout=120s
      delegate_to: "{{ groups['masters'][0] }}"
      changed_when: false

- name: k3s Worker upgraden
  hosts: workers
  become: true
  serial: 1   # Rolling-Upgrade, ein Worker nach dem anderen
  tasks:
    - name: Node cordonen
      ansible.builtin.command: kubectl cordon {{ inventory_hostname }}
      delegate_to: "{{ groups['masters'][0] }}"
      changed_when: true

    - name: Node drainieren
      ansible.builtin.command: >
        kubectl drain {{ inventory_hostname }}
          --ignore-daemonsets
          --delete-emptydir-data
          --timeout=120s
      delegate_to: "{{ groups['masters'][0] }}"
      changed_when: true

    - name: k3s-Agent upgraden
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
        INSTALL_K3S_VERSION="{{ k3s_version }}" \
        K3S_URL="https://{{ hostvars[groups['masters'][0]].ansible_host }}:6443" \
        K3S_TOKEN="{{ k3s_token }}" \
        sh -s - agent
      changed_when: true

    - name: Node uncordonen
      ansible.builtin.command: kubectl uncordon {{ inventory_hostname }}
      delegate_to: "{{ groups['masters'][0] }}"
      changed_when: true

    - name: Warte bis Node wieder Ready
      ansible.builtin.command: >
        kubectl wait node/{{ inventory_hostname }}
          --for=condition=Ready
          --timeout=120s
      delegate_to: "{{ groups['masters'][0] }}"
      changed_when: false
